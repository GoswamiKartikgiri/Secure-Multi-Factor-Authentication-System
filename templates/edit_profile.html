{% extends "base.html" %}

{% block title %}
Edit Profile
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-7">

            <div class="card shadow-lg border-0">

                <div class="card-header bg-primary text-white text-center">

                    <h3>

                        <i class="bi bi-pencil-square"></i>

                        Edit Profile

                    </h3>

                </div>

                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">

                                Full Name

                            </label>

                            <input
                                type="text"
                                name="full_name"
                                class="form-control"
                                value="{{ user.full_name }}"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                Email Address

                            </label>

                            <input
                                type="email"
                                class="form-control"
                                value="{{ user.email }}"
                                readonly>

                            <small class="text-muted">

                                Email cannot be changed.

                            </small>

                        </div>

                        <div class="d-flex justify-content-between">

                            <a
                                href="{{ url_for('dashboard.profile') }}"
                                class="btn btn-secondary">

                                <i class="bi bi-arrow-left"></i>

                                Back

                            </a>

                            <button
                                type="submit"
                                class="btn btn-primary">

                                <i class="bi bi-check-circle-fill"></i>

                                Save Changes

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
